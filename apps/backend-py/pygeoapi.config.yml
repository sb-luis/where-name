server:
  bind:
    host: 0.0.0.0
    port: 4100
  url: http://localhost:4100
  mimetype: application/json; charset=UTF-8
  encoding: utf-8
  gzip: true
  language: en-US
  languages:
    - en-US
  cors: true
  pretty_print: false
  map:
    url: https://tile.openstreetmap.org/{z}/{x}/{y}.png
    attribution: '&copy; <a href="https://openstreetmap.org/copyright">OpenStreetMap contributors</a>'
  limits:
    default_items: 100
    max_items: 10000

logging:
  level: ERROR

metadata:
  identification:
    title: Geo Data API
    description: OGC API — Features service for geospatial data.
    keywords:
      - geospatial
      - features
      - OGC
    keywords_type: theme
    terms_of_service: https://creativecommons.org/licenses/by/4.0/
    url: https://whereinworld.up.railway.app
  license:
    name: CC-BY 4.0
    url: https://creativecommons.org/licenses/by/4.0/
  provider:
    name: whereinworld.up.railway.app
    url: https://whereinworld.up.railway.app
  contact:
    name: Sanchez Barranquero, Luis
    email: luis.sb.dev@gmail.com
    url: https://luis.earth

resources:

  ne_110m_admin_0_countries:
    type: collection
    title: Natural Earth 110m Admin 0 Countries
    description: Country polygons at 1:110,000,000 scale from Natural Earth.
    keywords:
      - natural earth
      - countries
      - 110m
    links: []
    extents:
      spatial:
        bbox: [-180, -90, 180, 90]
        crs: http://www.opengis.net/def/crs/OGC/1.3/CRS84
    providers:
      - type: feature
        name: GeoJSON
        data: data/natural_earth/110m/cultural/ne_110m_admin_0_countries.geojson
        id_field: NE_ID

  ne_110m_admin_0_countries_lakes:
    type: collection
    title: Natural Earth 110m Admin 0 Countries (lakes cutout)
    description: Country polygons at 1:110,000,000 scale with major lake areas removed, from Natural Earth.
